spring.application.name=marcacoes
spring.config.import=optional:file:../.env[.properties]

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# PostGres Config
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging Configuration
# Shows helpful debug info for our own code, but keeps Spring framework quite (INFO)
logging.level.pt.florinhas=DEBUG

# Application Environment Configuration
# development or production
app.environment=${APP_ENVIRONMENT}
app.secure-cookies=${APP_SECURE_COOKIES}

# NIF encryption (AES-GCM) and blind index
app.security.encryption.key=${ENCRYPTION_KEY}
app.security.blindindex.key=${BLIND_INDEX_KEY}

# File Upload Configuration
app.upload.dir=${APP_UPLOAD_DIR}
app.upload.max-size=${APP_UPLOAD_MAX_SIZE}
# Gateway shared secret used by gateway-authenticated requests and websockets.
gateway.shared-secret=${GATEWAY_SHARED_SECRET:}
# Max file size (Spring Boot)
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# MinIO Configuration
minio.url=${MINIO_URL}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}


spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:25}
spring.datasource.hikari.connection-timeout=20000
notificacoes.url=${NOTIFICACOES_URL:http://localhost:8083}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
