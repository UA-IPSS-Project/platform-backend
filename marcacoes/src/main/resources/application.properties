spring.application.name=marcacoes
spring.config.import=optional:file:../.env[.properties]

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Database Configuration (example for H2)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# PostGres Config
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# NIF.pt Configuration
nif.pt.key=${NIF_PT_KEY}
nif.pt.url=${NIF_PT_URL}
# Logging Configuration
# Shows helpful debug info for our own code, but keeps Spring framework quite (INFO)
logging.level.pt.florinhas=DEBUG

# Application Environment Configuration
# development or production
app.environment=${APP_ENVIRONMENT}
app.secure-cookies=${APP_SECURE_COOKIES}

# File Upload Configuration
app.upload.dir=${APP_UPLOAD_DIR}
app.upload.max-size=${APP_UPLOAD_MAX_SIZE}
# Max file size (Spring Boot)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}

# MinIO Configuration
minio.url=${MINIO_URL}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}


spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=20000
