services:
  marcacoes:
    build:
      context: ./marcacoes
      dockerfile: Dockerfile
    container_name: marcacoes-backend
    ports:
      - "8080:8080"
    # environment:
      # - SPRING_PROFILES_ACTIVE=prod
    networks:
      - backend-network
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres
    container_name: florinhas_db
    environment:
      POSTGRES_DB: florinhas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
