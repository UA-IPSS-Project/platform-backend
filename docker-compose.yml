services:
  marcacoes:
    build:
      context: ./marcacoes
      dockerfile: Dockerfile
    container_name: marcacoes-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/florinhas
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESSKEY=admin
      - MINIO_SECRETKEY=password123
      - MINIO_BUCKET=marcacoes

    restart: unless-stopped

    develop:
      watch:
        - path: ./marcacoes/src
          action: rebuild
        - path: ./marcacoes/pom.xml
          action: rebuild

  frontend:
    build:
      context: ../platform-frontend/
      dockerfile: Dockerfile
    container_name: florinhas_frontend
    depends_on:
      - marcacoes
    ports:
      - "3000:80"

    restart: unless-stopped

    develop:
      watch:
        - path: ../platform-frontend/src
          action: rebuild
        - path: ../platform-frontend/package.json
          action: rebuild
        - path: ../platform-frontend/vite.config.ts
          action: rebuild

  postgres:
    image: postgres
    container_name: florinhas_db
    environment:
      POSTGRES_DB: florinhas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"


  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"


