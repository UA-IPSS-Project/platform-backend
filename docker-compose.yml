services:
  marcacoes:
    build:
      context: ./marcacoes
      dockerfile: Dockerfile
    container_name: marcacoes-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge
