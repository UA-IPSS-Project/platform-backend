services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - AUTH_MARCACOES_BASE_URL=${GATEWAY_MARCACOES_BASE_URL_DOCKER}
      - GATEWAY_MARCACOES_BASE_URL=${GATEWAY_MARCACOES_BASE_URL_DOCKER}
      - GATEWAY_MARCACOES_WS_BASE_URL=${GATEWAY_MARCACOES_WS_BASE_URL_DOCKER}
      - GATEWAY_REQUISICOES_BASE_URL=${GATEWAY_REQUISICOES_BASE_URL_DOCKER}
      - GATEWAY_REQUISICOES_WS_BASE_URL=${GATEWAY_REQUISICOES_WS_BASE_URL_DOCKER}
      - GATEWAY_NOTIFICACOES_BASE_URL=${GATEWAY_NOTIFICACOES_BASE_URL_DOCKER}
      - GATEWAY_NOTIFICACOES_WS_BASE_URL=${GATEWAY_NOTIFICACOES_WS_BASE_URL_DOCKER}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET}
    restart: unless-stopped
    depends_on:
      - marcacoes
      - requisicoes
      - candidaturas

  marcacoes:
    build:
      context: .
      dockerfile: marcacoes/Dockerfile
    container_name: marcacoes-backend
    expose:
      - "8080"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MINIO_URL=${MINIO_URL_DOCKER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET_MARCACOES}
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET}
      - NOTIFICACOES_URL=${NOTIFICACOES_URL_DOCKER}

    restart: unless-stopped

    develop:
      watch:
        - path: ./marcacoes/src
          action: rebuild
        - path: ./marcacoes/pom.xml
          action: rebuild

  requisicoes:
    build:
      context: .
      dockerfile: requisicoes/Dockerfile
    container_name: requisicoes-backend
    expose:
      - "8080"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MINIO_URL=${MINIO_URL_DOCKER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET_REQUISICOES}
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET}
      - NOTIFICACOES_URL=${NOTIFICACOES_URL_DOCKER}
    restart: unless-stopped
    develop:
      watch:
        - path: ./requisicoes/src
          action: rebuild
        - path: ./requisicoes/pom.xml
          action: rebuild

  candidaturas:
    build:
      context: .
      dockerfile: candidaturas/Dockerfile
    container_name: candidaturas-backend
    expose:
      - "8080"
    depends_on:
      - mongo-candidaturas
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATA_MONGODB_HOST=mongo-candidaturas
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=testdb
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    restart: unless-stopped
    develop:
      watch:
        - path: ./candidaturas/src
          action: rebuild
        - path: ./candidaturas/pom.xml
          action: rebuild

  mongo-candidaturas:
    image: mongo:latest
    container_name: mongo-candidaturas
    expose:
      - "27017"
    volumes:
      - mongo-candidaturas-data:/data/db
    restart: unless-stopped

  notificacoes:
    build:
      context: .
      dockerfile: notificacoes/Dockerfile
    container_name: notificacoes-backend
    expose:
      - "8083"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
    restart: unless-stopped
    develop:
      watch:
        - path: ./notificacoes/src
          action: rebuild
        - path: ./notificacoes/pom.xml
          action: rebuild

  frontend:
    build:
      context: ../platform-frontend/
      dockerfile: Dockerfile
    container_name: florinhas_frontend
    depends_on:
      - api-gateway
      - marcacoes
      - requisicoes
      - candidaturas
      - notificacoes
    ports:
      - "3000:80"

    restart: unless-stopped

    develop:
      watch:
        - path: ../platform-frontend/src
          action: rebuild
        - path: ../platform-frontend/package.json
          action: rebuild
        - path: ../platform-frontend/vite.config.ts
          action: rebuild

  postgres:
    image: postgres:16
    container_name: florinhas_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  mongo-candidaturas-data:

