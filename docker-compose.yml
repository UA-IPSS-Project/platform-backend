services:
  api-gateway:
    build:
      dockerfile: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    restart: unless-stopped
  marcacoes:
    build:
      context: .
      dockerfile: marcacoes/Dockerfile
    container_name: marcacoes-backend
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MINIO_URL=${MINIO_URL_DOCKER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET_MARCACOES}

    restart: unless-stopped

    develop:
      watch:
        - path: ./marcacoes/src
          action: rebuild
        - path: ./marcacoes/pom.xml
          action: rebuild

  requisicoes:
    build:
      context: .
      dockerfile: requisicoes/Dockerfile
    container_name: requisicoes-backend
    ports:
      - "8082:8080"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MINIO_URL=${MINIO_URL_DOCKER}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET_REQUISICOES}
    restart: unless-stopped
    develop:
      watch:
        - path: ./requisicoes/src
          action: rebuild
        - path: ./requisicoes/pom.xml
          action: rebuild

  frontend:
    build:
      context: ../platform-frontend/
      dockerfile: Dockerfile
    container_name: florinhas_frontend
    depends_on:
      - marcacoes
      - requisicoes
    ports:
      - "3000:80"

    restart: unless-stopped

    develop:
      watch:
        - path: ../platform-frontend/src
          action: rebuild
        - path: ../platform-frontend/package.json
          action: rebuild
        - path: ../platform-frontend/vite.config.ts
          action: rebuild

  postgres:
    image: postgres
    container_name: florinhas_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"


  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"


