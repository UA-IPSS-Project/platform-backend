spring.application.name=candidaturas

spring.config.import=optional:file:.env[.properties]

spring.profiles.active=${SPRING_PROFILES_ACTIVE}

# Import local .env if present (ignored in Docker where env vars are injected directly)

# MinIO Configuration
minio.url=${MINIO_URL:http://localhost:9000}
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:candidaturas}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.max-size=${APP_UPLOAD_MAX_SIZE:10485760}