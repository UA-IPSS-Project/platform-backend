spring.application.name=notificacoes
server.port=8083

# Database - use H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mail configuration for tests (prevent autoconfiguration errors)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT Secret for tests
jwt.secret=test-secret-key-1234567890

# Encryption keys for tests
app.security.encryption.key=12345678901234567890123456789012
app.security.blindindex.key=test-blind-index-key