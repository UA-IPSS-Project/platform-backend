spring.application.name=notificacoes
server.port=8083

# Database - use H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable mail autoconfiguration in tests
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# JWT Secret for tests
jwt.secret=12345678901234567890123456789012

# Encryption keys for tests
app.security.encryption.key=12345678901234567890123456789012
app.security.blindindex.key=test-blind-index-key