spring.application.name=api-gateway
server.port=8080

## Serviço Marcacoes
spring.cloud.gateway.routes[0].id=marcacoes-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/marcacoes/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

## Serviço Requisições
spring.cloud.gateway.routes[1].id=requisicoes-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/requisicoes/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

