# Cookie security configuration
app.secure-cookies=${SECURE_COOKIES:false}
app.cookie-samesite=${COOKIE_SAMESITE:Lax}

# NIF encryption (AES-GCM) and blind index
app.security.encryption.key=${ENCRYPTION_KEY}
app.security.blindindex.key=${BLIND_INDEX_KEY}
spring.application.name=api-gateway
spring.config.import=optional:file:../.env[.properties]
server.port=8080

# Database Configuration (shared with marcacoes/requisicoes)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

gateway.shared-secret=${GATEWAY_SHARED_SECRET:}

gateway.marcacoes.base-url=${GATEWAY_MARCACOES_BASE_URL:http://localhost:8081}
gateway.marcacoes.ws-base-url=${GATEWAY_MARCACOES_WS_BASE_URL:${WS_PROTOCOL:-ws}://localhost:8081}
gateway.requisicoes.base-url=${GATEWAY_REQUISICOES_BASE_URL:http://localhost:8082}
gateway.requisicoes.ws-base-url=${GATEWAY_REQUISICOES_WS_BASE_URL:${WS_PROTOCOL:-ws}://localhost:8082}
gateway.candidaturas.base-url=${GATEWAY_CANDIDATURAS_BASE_URL:http://localhost:8080}
gateway.notificacoes.base-url=${GATEWAY_NOTIFICACOES_BASE_URL:http://localhost:8083}
gateway.notificacoes.ws-base-url=${GATEWAY_NOTIFICACOES_WS_BASE_URL:${WS_PROTOCOL:-ws}://localhost:8083}

# Global CORS (single entry point at gateway)
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

## Gateway WebFlux usa spring.cloud.gateway.server.webflux.routes[*]

## Serviço Requisições - HTTP (frontend -> /api/requisicoes/**)

# Gateway routes (compatível com spring-cloud-starter-gateway)
spring.cloud.gateway.routes[0].id=requisicoes-service
spring.cloud.gateway.routes[0].uri=${gateway.requisicoes.base-url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/requisicoes/**

spring.cloud.gateway.routes[1].id=marcacoes-service
spring.cloud.gateway.routes[1].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/marcacoes/**

spring.cloud.gateway.routes[2].id=calendario-service
spring.cloud.gateway.routes[2].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/calendario/**

spring.cloud.gateway.routes[3].id=notificacoes-service
spring.cloud.gateway.routes[3].uri=${gateway.notificacoes.base-url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notificacoes,/api/notificacoes/**

spring.cloud.gateway.routes[4].id=documentos-service
spring.cloud.gateway.routes[4].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/documentos/**

spring.cloud.gateway.routes[5].id=utilizadores-service
spring.cloud.gateway.routes[5].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/utilizadores/**

spring.cloud.gateway.routes[6].id=requisicoes-ws-service
spring.cloud.gateway.routes[6].uri=${gateway.requisicoes.ws-base-url}
spring.cloud.gateway.routes[6].predicates[0]=Path=/ws/requisicoes/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/ws/requisicoes/?(?<segment>.*), /ws/${segment}

spring.cloud.gateway.routes[7].id=marcacoes-ws-service
spring.cloud.gateway.routes[7].uri=${gateway.marcacoes.ws-base-url}
spring.cloud.gateway.routes[7].predicates[0]=Path=/ws,/ws/**

spring.cloud.gateway.routes[8].id=armazem-service
spring.cloud.gateway.routes[8].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/armazem/**

spring.cloud.gateway.routes[9].id=legacy-marcacoes-service
spring.cloud.gateway.routes[9].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[9].predicates[0]=Path=/marcacoes/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[10].id=legacy-requisicoes-service
spring.cloud.gateway.routes[10].uri=${gateway.requisicoes.base-url}
spring.cloud.gateway.routes[10].predicates[0]=Path=/requisicoes/**
spring.cloud.gateway.routes[10].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[11].id=legacy-requisicoes-ws-service
spring.cloud.gateway.routes[11].uri=${gateway.requisicoes.ws-base-url}
spring.cloud.gateway.routes[11].predicates[0]=Path=/requisicoes/ws/**
spring.cloud.gateway.routes[11].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[12].id=reports-service
spring.cloud.gateway.routes[12].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/reports/**

spring.cloud.gateway.routes[13].id=candidaturas-forms-service
spring.cloud.gateway.routes[13].uri=${gateway.candidaturas.base-url}
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/forms/**

spring.cloud.gateway.routes[14].id=candidaturas-service
spring.cloud.gateway.routes[14].uri=${gateway.candidaturas.base-url}
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/candidaturas/**

spring.cloud.gateway.routes[15].id=assuntos-service
spring.cloud.gateway.routes[15].uri=${gateway.marcacoes.base-url}
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/assuntos/**

spring.cloud.gateway.routes[14].id=notificacoes-ws-service
spring.cloud.gateway.routes[14].uri=${gateway.notificacoes.base-url}
spring.cloud.gateway.routes[14].predicates[0]=Path=/ws-notificacoes,/ws-notificacoes/**
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/ws-notificacoes/?(?<segment>.*), /ws/${segment}

