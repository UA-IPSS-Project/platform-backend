spring.application.name=requisicoes
spring.config.import=optional:file:../.env[.properties]

# Database Configuration (shared with marcacoes)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.pt.florinhas=DEBUG

# Gateway shared secret used by gateway-authenticated requests and websockets.
gateway.shared-secret=${GATEWAY_SHARED_SECRET:}

# HikariCP Configuration aka Connection Pool aka More efficient database connections
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=20000

# Notificações service URL
notificacoes.url=${NOTIFICACOES_URL:http://localhost:8083}logging.level.org.springframework.security=DEBUG
