name: CI - Testes IPSS Digital Backend

on:
  pull_request:
    branches: [ "main", "dev" ] # Corre apenas em PRs para a main ou para a dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar o Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Docker Compose
        run: docker-compose up -d

      - name: Verificar se os contentores estao saudaveis
        run: |
          echo "A aguardar 20 segundos para os servicos estabilizarem..."
          sleep 20
          
          echo "Estado atual dos contentores:"
          docker-compose ps
          
          echo "A verificar se a Base de Dados (Postgres) esta a aceitar ligacoes..."
          while ! nc -z localhost 5432; do
            sleep 1
            echo "A aguardar pela base de dados..."
          done
          echo "Base de dados pronta!"

      - name: Correr Testes do Backend (Maven Spring Boot)
        run: |
          # Entra na pasta do backend
          cd backend
          
          # Corre os testes
          mvn clean test
          
      - name: Limpar contentores
        if: always()
        run: docker-compose down