name: Deploy Backend to Azure VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted, ipss-vm]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Deploy Backend Direct on VM
        run: |
          set -euo pipefail
          # Entrar na pasta do backend e atualizar o código
          cd /home/florinhasuser/ipss-digital/platform-backend
          git fetch origin main
          git reset --hard origin/main

          # Reconstruir a app
          docker compose up -d --build
          
          # Limpeza de imagens antigas
          docker image prune -f